name: "Claude Terminal"
description: "Terminal interface for Anthropic's Claude Code CLI"
version: "2.0.3"
slug: "claude_terminal"
init: false

# Supported architectures.
# armv7 is dropped: Bun (required by some plugin runtimes such as the official
# Telegram channel) does not ship a musl build for armv7.
arch:
  - aarch64
  - amd64

# External resources
url: "https://github.com/anthropics/claude-code"

# Web interface configuration
ingress: true
ingress_port: 7681
panel_icon: mdi:code-braces
panel_title: "Claude Terminal"
panel_admin: true

# Port configuration
ports:
  7681/tcp: 7681
ports_description:
  7681/tcp: "Web terminal (not required for ingress)"

# Add-on configuration options.
# `startup_command` is the single user-tunable knob. When empty (default), the
# tmux session opens a plain bash shell — type `claude` yourself, like a normal
# terminal. When set, the command runs inside the tmux session at container boot
# and stays running until it exits, regardless of whether the web terminal is open.
# Useful values:
#   ""                                                                  → plain bash (default)
#   "claude"                                                            → auto-launch Claude
#   "claude -c"                                                         → resume most recent conversation
#   "claude -c --channels plugin:telegram@claude-plugins-official"      → always-on Telegram bot
#
# When the configured command exits, the tmux session falls through to a bash
# prompt so you can reconnect via the web terminal and recover.
options:
  startup_command: ""
schema:
  startup_command: str?

# Volume mapping for persistent storage
map:
  - config:rw    # Claude configuration and credentials
  - addons:ro    # Read-only access to other add-ons

# Service startup configuration
startup: services