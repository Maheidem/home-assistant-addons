# tmux configuration for Claude Terminal
# Optimized for web-based terminal access via ttyd

# Mouse mode is OFF on purpose: with it on, tmux intercepts drag events, which
# cancels the browser's native text selection in ttyd and makes copy-paste
# impossible. The user only ever sees one pane here, so there's no benefit to
# tmux mouse mode. Wheel-scroll still works via ttyd's xterm.js scrollback.
set -g mouse off

# Increase scrollback history from default 2000
set -g history-limit 50000

# Hide status bar — users accessing via web UI don't need tmux session info
set -g status off

# Use 256-color terminal for proper rendering in ttyd/xterm
set -g default-terminal "xterm-256color"

# Reduce escape-key delay (default 500ms causes sluggish Vim/Claude usage)
set -sg escape-time 50

# Source user overrides from the persistent volume if present. Drop your own
# tmux settings in /config/claude-config/tmux.conf.local and they stick
# across add-on restarts.
if-shell "[ -f /config/claude-config/tmux.conf.local ]" \
    "source-file /config/claude-config/tmux.conf.local"
