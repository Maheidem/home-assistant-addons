name: "OpenCode"
description: "OpenCode web UI — a coding agent you drive from the Home Assistant dashboard"
version: "1.0.3"
slug: "opencode_terminal"
init: false

# Supported architectures.
# armv7 is dropped because Bun (required by OpenCode plugins and some MCP
# servers) does not ship a musl build for armv7.
arch:
  - aarch64
  - amd64

# External resources
url: "https://opencode.ai"

# Web interface configuration
ingress: true
ingress_port: 7682
ingress_stream: true
panel_icon: mdi:code-tags
panel_title: "OpenCode"
panel_admin: true

# Port configuration.
# Port 7682 is exposed host-side by default because OpenCode's web UI uses
# absolute asset paths (<script src="/assets/...">), which break behind HA
# ingress's subpath proxy. OpenCode has no --base-path flag. Until upstream
# adds one, use the direct URL: http://<hass-ip>:7682/
#
# SECURITY: without OPENCODE_SERVER_PASSWORD set (see server_password
# option below), the exposed port is UNAUTHENTICATED. Only expose on
# trusted networks, or set server_password.
#
# Clicking "OPEN WEB UI" in the HA dashboard uses ingress and will show a
# blank page until upstream adds base-path support — this is a known
# limitation, tracked in opencode-terminal/DOCS.md.
ports:
  7682/tcp: 7682
ports_description:
  7682/tcp: "OpenCode web UI (use http://<hass-ip>:7682 until HA ingress gains base-path support)"

# Add-on options.
# Secrets are declared as top-level fields so HA renders them as password
# inputs (supervisor stores them encrypted, never round-trips to the UI in
# plaintext). They get exported as env vars by run.sh, so your opencode.json
# can reference them with `{env:ZHIPU_API_KEY}` etc.
#
# `extra_env` is a multi-line escape hatch for anything beyond the curated
# five. One KEY=VALUE per line.
options:
  log_level: info
  server_password: ""
  zhipu_api_key: ""
  anthropic_api_key: ""
  openai_api_key: ""
  waha_api_key: ""
  waha_api_url: ""
  extra_env: ""
schema:
  # OpenCode's valid levels are DEBUG|INFO|WARN|ERROR (opencode web --help).
  # We take them lowercase here and upcase in run.sh before passing through.
  log_level: list(debug|info|warn|error)
  # When set, opencode web enforces HTTP basic auth using this password.
  # Strongly recommended if you access the add-on via the direct port
  # (http://<hass-ip>:7682), since HA ingress's auth does not apply there.
  server_password: password?
  zhipu_api_key: password?
  anthropic_api_key: password?
  openai_api_key: password?
  waha_api_key: password?
  waha_api_url: str?
  extra_env: str?

# Volume mapping — modern HA pattern.
# - addon_config (rw): user-editable files at /config inside the container,
#   visible on the host at /addon_configs/opencode_terminal/, included in
#   per-add-on backups. This is where opencode.json lives.
# - /data is mounted automatically by the supervisor (no map entry needed).
#   Add-on-private state (SQLite DB, auth.json, MCP auth, gh creds, SSH keys,
#   shell history, opencode installation dir) lives here.
#
# We do NOT map `config:rw` — that would give the add-on read/write access
# to every HA integration secret.
map:
  - addon_config:rw

# AppArmor is explicitly disabled for 1.0.x. The 1.0.0 starter profile was
# too restrictive — blocked execution of /init (the s6-overlay entrypoint).
# HA's default is `apparmor: true`, which auto-loads apparmor.txt if the
# file exists in the add-on folder, so we must set `false` AND remove the
# file. Shipping unconfined matches claude-terminal (which has no
# apparmor.txt). Planned for a future minor version once a field-tested
# profile exists.
apparmor: false

# Service startup configuration
startup: services
