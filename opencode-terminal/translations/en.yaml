configuration:
  log_level:
    name: Log level
    description: >-
      OpenCode's logging verbosity. `debug` for diagnosing boot issues,
      `info` for normal use. Accepts debug / info / warn / error.
  zhipu_api_key:
    name: Zhipu / GLM API key
    description: >-
      Exported as `ZHIPU_API_KEY`. Reference from opencode.json with
      `{env:ZHIPU_API_KEY}`.
  anthropic_api_key:
    name: Anthropic API key
    description: >-
      Exported as `ANTHROPIC_API_KEY`. Used by OpenCode's Anthropic provider
      when you want Claude without going through the CLI.
  openai_api_key:
    name: OpenAI API key
    description: >-
      Exported as `OPENAI_API_KEY`. Used by OpenCode's OpenAI provider.
  waha_api_key:
    name: Waha API key
    description: >-
      Exported as `WAHA_API_KEY`. Used by the Waha WhatsApp MCP server.
  waha_api_url:
    name: Waha API URL
    description: >-
      Exported as `WAHA_API_URL`. Base URL of your Waha instance
      (e.g. http://192.168.1.100:8200/api).
  extra_env:
    name: Extra environment variables
    description: >-
      One `KEY=VALUE` per line. Anything in here is exported into OpenCode's
      environment. Useful for provider keys beyond the curated five.
